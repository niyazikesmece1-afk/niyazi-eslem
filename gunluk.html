<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizim Günlüğümüz ❤️</title>
    <style>
        :root { --bg-color: #f7f1f1; --primary-color: #ff6b81; --text-color: #4a4a4a; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #ff6b81, #ff4757); color: white; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-sizing: border-box; }
        header h1 { margin: 0; font-size: 2.2rem; font-weight: 600; }
        header p { margin: 10px 0 0 0; opacity: 0.9; font-style: italic; font-size: 0.95rem; }
        .counter-container { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: -20px 20px 30px 20px; text-align: center; max-width: 400px; width: 85%; z-index: 10; box-sizing: border-box; }
        .counter-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #a4b0be; margin-bottom: 10px; }
        .counter-timer { font-size: 1.3rem; font-weight: bold; color: var(--primary-color); line-height: 1.4; }
        .timeline { width: 90%; max-width: 600px; display: flex; flex-direction: column; gap: 25px; padding-bottom: 30px; box-sizing: border-box; }
        .diary-card { background: var(--card-bg); border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); position: relative; box-sizing: border-box; }
        .diary-date { font-size: 0.85rem; color: var(--primary-color); font-weight: bold; margin-bottom: 8px; }
        .diary-title { font-size: 1.15rem; margin: 0 0 10px 0; color: #2f3542; }
        .diary-content { font-size: 0.95rem; line-height: 1.6; margin: 0; white-space: pre-wrap; }
        
        /* Not Ekleme Formu */
        .form-container { background: var(--card-bg); width: 90%; max-width: 600px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 40px; box-sizing: border-box; }
        .form-container h3 { margin: 0 0 15px 0; color: #2f3542; font-size: 1.2rem; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #f1f2f6; border-radius: 10px; background-color: #f8f9fa; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; outline: none; }
        input:focus, textarea:focus { border-color: var(--primary-color); }
        textarea { height: 100px; resize: none; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #ff6b81, #ff4757); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 107, 129, 0.3); }
        button:active { transform: scale(0.98); }
        .heart-icon { display: inline-block; animation: heartbeat 1.5s infinite; margin: 0 5px; }
        @keyframes heartbeat { 0% { transform: scale(1); } 14% { transform: scale(1.3); } 28% { transform: scale(1); } 42% { transform: scale(1.3); } 70% { transform: scale(1); } }
    </style>
</head>
<body>
    <header>
        <h1>Niyazi <span class="heart-icon">❤️</span> Eslem</h1>
        <p>İyi ki hayatımdasın, iyi ki bizim her anımız özel...</p>
    </header>
    
    <div class="counter-container">
        <div class="counter-title">Aşkımızın Başlangıcından Beri</div>
        <div class="counter-timer" id="love-counter">Yükleniyor...</div>
    </div>

    <div class="timeline" id="diary-timeline"></div>

    <div class="form-container">
        <h3>Bugünün Anısını Yaz ❤️</h3>
        <input type="text" id="note-title" placeholder="Anının Başlığı (Örn: İlk Sinemamız)">
        <textarea id="note-content" placeholder="Neler hissettin, buraya yaz sevgilim..."></textarea>
        <button onclick="addNote()">Günlüğe Ekle</button>
    </div>

    <script>
        const startDate = new Date(2026, 5, 19, 0, 0, 0); 
        function updateCounter() {
            const now = new Date(); const difference = now - startDate;
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((difference / 1000 / 60) % 60);
            const seconds = Math.floor((difference / 1000) % 60);
            document.getElementById('love-counter').innerHTML = `${days} Gün, ${hours} Saat, ${minutes} Dakika, ${seconds} Saniye`;
        }
        setInterval(updateCounter, 1000); updateCounter();

        // Veri Tabanı İşlemleri (Tarayıcı Hafızası)
        function loadNotes() {
            const timeline = document.getElementById('diary-timeline');
            timeline.innerHTML = '';
            const notes = JSON.parse(localStorage.getItem('love_diary_notes')) || [];
            
            // Eğer hiç not yoksa başlangıç notu ekle
            if(notes.length === 0) {
                notes.push({
                    date: "19 Haziran 2026",
                    title: "Gülüşünle Başlayan Hikayemiz",
                    content: "Her şeyin resmi olarak başladığı, hayatımın en güzel günü. İyi ki varsın sevgilim."
                });
            }

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'diary-card';
                card.innerHTML = `
                    <div class="diary-date">${note.date}</div>
                    <h3 class="diary-title">${note.title}</h3>
                    <p class="diary-content">${note.content}</p>
                `;
                timeline.appendChild(card);
            });
        }

        function addNote() {
            const titleInput = document.getElementById('note-title');
            const contentInput = document.getElementById('note-content');
            
            if(!titleInput.value || !contentInput.value) {
                alert('Lütfen başlık ve anı alanını boş bırakma kanka!');
                return;
            }

            const today = new Date();
            const dateStr = today.getDate() + ' ' + today.toLocaleString('tr-TR', { month: 'long' }) + ' ' + today.getFullYear();

            const newNote = {
                date: dateStr,
                title: titleInput.value,
                content: contentInput.value
            };

            const notes = JSON.parse(localStorage.getItem('love_diary_notes')) || [];
            notes.unshift(newNote); // Yeni notu en üste ekle
            localStorage.setItem('love_diary_notes', JSON.stringify(notes));

            titleInput.value = '';
            contentInput.value = '';
            loadNotes();
        }

        window.onload = loadNotes;
    </script>
</body>
</html>
