<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizim Günlüğümüz ❤️</title>
    <!-- Supabase Kütüphanesini Ekliyoruz -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #f7f1e3; --card-bg: #ffffff; --text-color: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 2.5rem; color: #ff5252; }
        p { margin: 10px 0 0; opacity: 0.8; }
        .counter-container { text-align: center; background: var(--card-bg); padding: 15px 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .counter-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .counter-timer { font-size: 1.5rem; color: #ff5252; font-weight: bold; }
        .timeline { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
        .diary-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #ff5252; position: relative; }
        .diary-date { font-size: 0.85rem; color: #7f8c8d; margin-bottom: 8px; }
        .diary-title { font-size: 1.15rem; margin: 0 0 10px 0; color: var(--text-color); }
        .diary-content { font-size: 0.95rem; line-height: 1.5; margin: 0; white-space: pre-wrap; }
        .form-container { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 600px; box-sizing: border-box; }
        .form-container h3 { margin: 0 0 15px 0; color: var(--text-color); display: flex; align-items: center; gap: 8px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.3s; }
        input:focus, textarea:focus { border-color: #ff5252; outline: none; }
        textarea { height: 100px; resize: none; }
        button { width: 100%; padding: 12px; background-color: #ff5252; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.3s, transform 0.1s; }
        button:active { transform: scale(0.98); }
        .heart-icon { display: inline-block; animation: heartbeat 1.2s infinite; }
        @keyframes heartbeat { 0% { transform: scale(1); } 20% { transform: scale(1.1); } 40% { transform: scale(1.05); } 60% { transform: scale(1.15); } 80% { transform: scale(1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <h1>Niyaz <span class="heart-icon">❤️</span> Eslem</h1>
        <p>İyi ki hayatımdasın, iyi ki bizim hikayemiz...</p>
    </header>

    <div class="counter-container">
        <div class="counter-title">Aşkımızın Başlangıcından Beri:</div>
        <div class="counter-timer" id="love-counter">Yükleniyor...</div>
    </div>

    <div class="timeline" id="diary-timeline"></div>

    <div class="form-container">
        <h3>Bugünün Anısını Yaz <span class="heart-icon">❤️</span></h3>
        <input type="text" id="note-title" placeholder="Başlık girin...">
        <textarea id="note-content" placeholder="Anınızı buraya yazın..."></textarea>
        <button onclick="addNote()">Günlüğe Ekle ✨</button>
    </div>

    <script>
        // Kesinleşen ve güncellenen Supabase bağlantı bilgileri
        const SUPABASE_URL = 'https://kodznxbzuxdyhukkrsd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_MYEsLUqJvZvKW1dwVyqgew_LukNyN90';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Sayaç İşlemleri (19 Haziran 2026 Başlangıç)
        const startDate = new Date(2026, 5, 19); 
        function updateCounter() {
            const now = new Date();
            const difference = now - startDate;
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            document.getElementById('love-counter').innerHTML = `${days} Gün, ${hours} Saat, ${minutes} Dakika, ${seconds} Saniye`;
        }
        setInterval(updateCounter, 1000);

        // Veri Tabanından Notları Çekme (Supabase)
        async function loadNotes() {
            const timeline = document.getElementById('diary-timeline');
            timeline.innerHTML = 'Yükleniyor...';

            const { data: notes, error } = await supabaseClient
                .from('günlük_notlari')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                timeline.innerHTML = 'Notlar yüklenirken bir sorun oluştu.';
                console.error(error);
                return;
            }

            timeline.innerHTML = '';

            if (notes.length === 0) {
                timeline.innerHTML = `
                    <div class="diary-card">
                        <div class="diary-date">19 Haziran 2026</div>
                        <div class="diary-title">Gülüşünle Başlayan Hikayemiz...</div>
                        <div class="diary-content">Her şeyin resmi olarak başladığı o özel gün. İlk günlüğümüz hayırlı olsun sevgilim! İlk anımızı yazmanı bekliyorum...</div>
                    </div>`;
                return;
            }

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'diary-card';
                card.innerHTML = `
                    <div class="diary-date">${note.tarih}</div>
                    <div class="diary-title">${note.baslik}</div>
                    <p class="diary-content">${note.icerik}</p>
                `;
                timeline.appendChild(card);
            });
        }

        // Supabase'e Yeni Not Ekleme
        async function addNote() {
            const titleInput = document.getElementById('note-title');
            const contentInput = document.getElementById('note-content');

            if (!titleInput.value.trim() || !contentInput.value.trim()) {
                alert('Lütfen başlık ve anı alanını boş bırakmayın!');
                return;
            }

            const today = new Date();
            const dateStr = today.getDate() + ' ' + today.toLocaleString('tr-TR', { month: 'long' }) + ' ' + today.getFullYear();

            const { error } = await supabaseClient
                .from('günlük_notlari')
                .insert([
                    { tarih: dateStr, baslik: titleInput.value, icerik: contentInput.value }
                ]);

            if (error) {
                alert('Anı eklenirken hata oluştu!');
                console.error(error);
            } else {
                titleInput.value = '';
                contentInput.value = '';
                loadNotes();
            }
        }

        window.onload = loadNotes;
    </script>
</body>
</html>
