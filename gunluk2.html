<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizim Günlüğümüz ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #fdf6f0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; width: 100%; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ff7675; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Niyaz ❤️ Eslem</h1>
    <div id="notes"></div>
    <div class="card">
        <input type="text" id="title" placeholder="Başlık...">
        <textarea id="content" placeholder="Anını yaz..."></textarea>
        <button onclick="addNote()">Günlüğe Ekle ✨</button>
    </div>
    <script>
        const sb = supabase.createClient('https://kodznxbzuxdyhukkrsd.supabase.co', 'sb_publishable_MYEsLUqJvZvKW1dwVyqgew_LukNyN90');
        
        async function load() {
            const { data, error } = await sb.from('gunluk_notlari').select('*').order('id', { ascending: false });
            if (data) {
                document.getElementById('notes').innerHTML = data.map(n => 
                    `<div class="card"><strong>${n.baslik}</strong><p>${n.icerik}</p><small>${n.tarih}</small></div>`
                ).join('');
            }
        }
        
        async function addNote() {
            const t = document.getElementById('title').value;
            const c = document.getElementById('content').value;
            await sb.from('gunluk_notlari').insert([{ tarih: new Date().toLocaleDateString('tr-TR'), baslik: t, icerik: c }]);
            location.reload();
        }
        
        load();
    </script>
</body>
</html>
